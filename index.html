<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastDroid — Fast, Open Android App Distribution</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="FastDroid is a fast, lightweight directory for open-source Android apps. Direct downloads from official releases. No trackers, no ads, no rebuild delays."
    />
    <meta name="author" content="FastDroid" />
    <meta name="robots" content="index, follow" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#22c55e" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/android-chrome-512x512.png"
    />

    <!-- Open Graph (Discord, WhatsApp, etc.) -->
    <meta property="og:site_name" content="FastDroid" />
    <meta property="og:title" content="FastDroid — Open Android App Distribution" />
    <meta
      property="og:description"
      content="Discover open-source Android apps with instant downloads from official developer releases. No mirrors. No rebuild queues."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fastdroid.vercel.app" />
    <meta
      property="og:image"
      content="https://fastdroid.vercel.app/android-chrome-512x512.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FastDroid" />
    <meta
      name="twitter:description"
      content="Fast, transparent distribution for open Android apps."
    />
    <meta
      name="twitter:image"
      content="https://fastdroid.vercel.app/android-chrome-512x512.png"
    />

    <!-- Performance -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
